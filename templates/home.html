{% extends "base.html" %}
{% block title %}Home – Mastering the Pull{% endblock %}

{% block content %}
<div class="row justify-content-center text-center mt-5">
  <div class="col-md-8">

    <h1 class="display-4 fw-bold">MASTERING THE PULL</h1>
    <p class="lead mt-3">
      In the next few minutes, you'll get familiar with the five major upper
      body muscle groups and the key exercises that target each one.
    </p>

    <div class="border rounded d-flex align-items-center justify-content-center bg-light mx-auto" style="height: 260px; max-width: 520px;">
      <img
        src="{{ url_for('static', filename='images/gif/prototype-exercises.gif') }}"
        alt="Exercise preview"
        style="max-width: 100%; max-height: 100%;"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
      />
      <span class="text-muted" style="display:none;">[Preview GIF unavailable]</span>
    </div>

    <!-- Start creates a new DB session and goes to lesson 1 -->
    <form action="{{ url_for('start') }}" method="POST" class="mt-4">
      <button type="submit" class="btn btn-warning btn-lg px-5">
        CLICK TO BEGIN YOUR WEIGHT LIFTING JOURNEY
      </button>
    </form>

  </div>
</div>
{% endblock %}
