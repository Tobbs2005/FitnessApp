<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Mastering the Pull{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body class="app-body">

<!-- ── Nav ──────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand navbar-dark bg-secondary">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">FitnessBuddy</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="{{ url_for('home') }}">HOME</a>
      <a class="nav-link" href="{{ url_for('exercises') }}">EXERCISES</a>
      <a class="nav-link" href="{{ url_for('quiz_intro') }}">QUIZ</a>
    </div>
  </div>
</nav>

<!-- ── Page content ─────────────────────────────────────────────────── -->
<div class="container my-4">
  {% block content %}{% endblock %}
</div>

<!-- jQuery + Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
